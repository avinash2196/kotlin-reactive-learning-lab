# ---------------------------------------------------------------------------
# Kotlin Reactive Learning Lab - Application Configuration
# ---------------------------------------------------------------------------

# Show all R2DBC SQL statements in the log — useful for understanding
# what queries the reactive repository generates at runtime.
logging.level.org.springframework.data.r2dbc=DEBUG

# R2DBC: in-memory H2 database
# DB_CLOSE_DELAY=-1  keeps the database alive for the lifetime of the JVM.
# DB_CLOSE_ON_EXIT=FALSE prevents H2 from closing when the last connection drops.
spring.r2dbc.url=r2dbc:h2:mem:///productdb?options=DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.r2dbc.username=sa
spring.r2dbc.password=

server.port=8080
